# .github/dependabot.yml
version: 2
updates:
  # === Atualizações de dependências npm (seu projeto) ===
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Sao_Paulo'
    target-branch: 'develop'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    open-pull-requests-limit: 10
    versioning-strategy: 'auto'
    # Ignorar versões principais (opcional)
    ignore:
      - dependency-name: '@nestjs/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
        update-types:
          - 'minor'
          - 'patch'
      eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'eslint*'
        update-types:
          - 'minor'
          - 'patch'

  # === Atualizações do GitHub Actions ===
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: 'develop'
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'github-actions'
    open-pull-requests-limit: 5

  # === Atualizações do Docker (se usar) ===
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: 'develop'
    commit-message:
      prefix: 'docker'
    labels:
      - 'dependencies'
      - 'docker'
    open-pull-requests-limit: 5
